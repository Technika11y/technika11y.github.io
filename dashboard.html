<!doctype html>
<html lang="en" data-motion="on">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Status board — Technika11y</title>
  <meta name="description" content="Live status of the Technika11y suite — projects, tests, and roadmap progress.">
  <style>
    :root{
      --bg:#0d0d0d;--panel:#121316;--ink:#cdd6df;--muted:#8b95a1;--cyan:#00ffff;--magenta:#ff00ff;
      --yellow:#ffff00;--green:#3fff9f;--line:#1e2128;--grid:rgba(0,255,255,.08);
      --mono:ui-monospace,"JetBrains Mono","Fira Code",Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);line-height:1.5;overflow-x:hidden}
    a{color:var(--cyan)}
    a:focus-visible{outline:3px solid var(--yellow);outline-offset:2px}
    .skip{position:absolute;left:-999px;top:0;background:var(--yellow);color:#000;padding:.6rem 1rem;font-weight:700}
    .skip:focus{left:.5rem;top:.5rem}
    .grid-bg{position:fixed;inset:-20%;z-index:0;pointer-events:none;
      background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
      background-size:40px 40px;animation:drift 18s linear infinite;mask-image:radial-gradient(circle at 50% 0,#000,transparent 80%)}
    @keyframes drift{to{background-position:0 40px,40px 0}}
    .wrap{position:relative;z-index:1;width:min(1080px,94vw);margin:0 auto;padding:2rem 0 4rem}
    .top{display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:1rem}
    .brand{font-weight:800;letter-spacing:.12em;text-decoration:none;color:var(--ink)}
    .brand .n{color:var(--cyan)}
    .top .sub{color:var(--muted);font-size:.85rem}
    .top nav{margin-left:auto;display:flex;gap:1rem}
    .top nav a{color:var(--muted);text-decoration:none;font-size:.85rem}
    .top nav a:hover{color:var(--cyan)}
    h1{font-size:clamp(1.3rem,4vw,1.8rem);margin:1.6rem 0 .2rem}
    h1 .hash{color:var(--magenta)}
    .cursor{display:inline-block;width:.5ch;height:1em;background:var(--cyan);vertical-align:-.1em;margin-left:.15em;animation:blink 1.1s step-end infinite}
    @keyframes blink{50%{opacity:0}}
    .meta{color:var(--muted);font-size:.82rem;margin:0 0 1.6rem}
    .allok{color:var(--green)}
    .allok .dot{display:inline-block;width:.6em;height:.6em;border-radius:50%;background:var(--green);margin-right:.4em;box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.4}}
    /* stat row */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin:0 0 2.4rem}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:1.1rem 1.2rem}
    .stat .v{font-size:2rem;font-weight:800;color:var(--cyan);line-height:1}
    .stat .l{color:var(--muted);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;margin-top:.4rem}
    .stat.roadmap .bar{height:6px;background:#0a0a0a;border-radius:3px;margin-top:.7rem;overflow:hidden}
    .stat.roadmap .fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--magenta));transition:width 1.4s ease}
    /* module + cards */
    .module{margin:0 0 2rem}
    .module h2{font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin:0 0 .9rem;border-left:3px solid var(--magenta);padding-left:.6rem}
    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:1rem 1.1rem;opacity:0;transform:translateY(14px);animation:rise .5s ease forwards;text-decoration:none;color:inherit;display:block}
    .card:hover{border-color:var(--cyan)}
    @keyframes rise{to{opacity:1;transform:none}}
    .card .h{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
    .card .name{font-weight:700;color:var(--ink)}
    .card .id{color:var(--muted);font-size:.7rem;border:1px solid var(--line);border-radius:4px;padding:.05rem .4rem}
    .card .st{margin-left:auto;display:flex;align-items:center;gap:.35rem;color:var(--green);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em}
    .card .st .dot{width:.5em;height:.5em;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
    .card .blurb{color:var(--muted);font-size:.82rem;margin:.3rem 0 .6rem}
    .card .foot{display:flex;gap:.8rem;font-size:.72rem;color:var(--muted)}
    .card .foot .tests{color:var(--cyan)}
    .card .foot .lang{text-transform:uppercase;letter-spacing:.05em}
    footer{color:var(--muted);font-size:.8rem;border-top:1px solid var(--line);margin-top:1.5rem;padding-top:1rem}
    footer .mono{color:var(--cyan)}
    @media(prefers-reduced-motion:reduce){
      .grid-bg,.cursor,.dot,.card{animation:none!important}
      .card{opacity:1;transform:none}
      .stat.roadmap .fill{transition:none}
    }
  </style>
</head>
<body>
  <a class="skip" href="#main">Skip to main content</a>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="index.html">TECHNIKA<span class="n">11</span>Y</a>
      <span class="sub">// status board</span>
      <nav aria-label="Primary"><a href="index.html">home</a><a href="blog/">blog</a><a href="https://github.com/technika11y">github</a></nav>
    </div>

    <main id="main">
      <h1><span class="hash">//</span> suite status<span class="cursor" aria-hidden="true"></span></h1>
      <p class="meta">Last built <time datetime="2026-07-15">2026-07-15</time> · <span class="allok"><span class="dot"></span>all systems green</span></p>

      <section class="stats" aria-label="Summary">
        <div class="stat"><div class="v" data-count="15">15</div><div class="l">public repos</div></div>
        <div class="stat"><div class="v" data-count="128">128</div><div class="l">tests passing</div></div>
        <div class="stat"><div class="v">100<span style="font-size:1.1rem">%</span></div><div class="l">CI green</div></div>
        <div class="stat roadmap"><div class="v"><span data-count="11">11</span><span style="color:var(--muted);font-size:1.1rem"> / 28</span></div><div class="l">roadmap built</div><div class="bar"><div class="fill" data-w="39"></div></div></div>
      </section>

      <div id="modules"></div>
    </main>

    <footer><span class="mono">chmod +a11y</span> — Technika11y · <a href="index.html">home</a> · <a href="https://github.com/technika11y">the org</a></footer>
  </div>

  <script>
    const P = [
      {id:'RES-06',name:'shadow-dom-auditor',mod:'research',tests:15,lang:'node',blurb:'Pierces shadow DOM for hidden a11y defects + injection smells.'},
      {id:'IA-02',name:'pdf-ua-linter',mod:'assurance',tests:14,lang:'py',blurb:'PDF/UA (ISO 14289) conformance, mapped to Matterhorn checkpoints.'},
      {id:'IA-04',name:'vpat-generator',mod:'assurance',tests:13,lang:'py',blurb:'Accessibility Conformance Reports from a 55-criteria WCAG 2.2 catalog.'},
      {id:'IA-05',name:'procurement-scanner',mod:'assurance',tests:7,lang:'py',blurb:'SBOM × Section 508 × security baseline → go / no-go.'},
      {id:'IA-06',name:'incident-disclosure-toolkit',mod:'assurance',tests:7,lang:'py',blurb:'Incident facts → dated GDPR / US breach-notification checklist.'},
      {id:'IA-07',name:'log-hardener',mod:'assurance',tests:9,lang:'py',blurb:'Strips PII from log lines before they reach a SIEM.'},
      {id:'OPS-07',name:'menu-a11y-engine',mod:'operations',tests:11,lang:'node',blurb:'Menu data → WCAG, allergen-aware, screen-reader menus.'},
      {id:'OPS-08',name:'allergen-validator',mod:'operations',tests:7,lang:'py',blurb:'Declared allergens vs. ingredients (FALCPA Big-9 / EU FIC).'},
      {id:'OPS-09',name:'iot-firmware-auditor',mod:'operations',tests:9,lang:'py',blurb:'Kitchen IoT inventory → known-bad firmware / default creds.'},
      {id:'OPS-10',name:'kitchen-microsegmenter',mod:'operations',tests:10,lang:'py',blurb:'Zero-trust nftables — a sensor cannot pivot to the POS.'},
      {id:'OPS-12',name:'sous-vide-telemetry',mod:'operations',tests:9,lang:'py',blurb:'Hash-chained tamper-evident HACCP cook-temp ledger.'},
      {id:'LABS',name:'tron',mod:'labs',tests:8,lang:'py',blurb:'The Grid guardian — derezzes traffic off the sanctioned list.'},
      {id:'LABS',name:'cyberdyne',mod:'labs',tests:9,lang:'py',blurb:'The safety governor — the off switch Skynet never had.'}
    ];
    const ORDER = [['research','research'],['assurance','assurance'],['operations','operations'],['labs','labs']];
    const root = document.getElementById('modules');
    let n = 0;
    for (const [key,label] of ORDER){
      const items = P.filter(p=>p.mod===key);
      const sec = document.createElement('section');
      sec.className='module';
      sec.innerHTML = `<h2>${label} · ${items.length}</h2><div class="cards"></div>`;
      const cards = sec.querySelector('.cards');
      for (const p of items){
        const a = document.createElement('a');
        a.className='card';
        a.href=`https://github.com/technika11y/${p.name}`;
        a.style.animationDelay = (n++ * 55) + 'ms';
        a.innerHTML =
          `<div class="h"><span class="name">${p.name}</span><span class="id">${p.id}</span>`+
          `<span class="st"><span class="dot"></span>alpha</span></div>`+
          `<p class="blurb">${p.blurb}</p>`+
          `<div class="foot"><span class="tests">${p.tests} tests</span><span class="lang">${p.lang}</span></div>`;
        cards.appendChild(a);
      }
      root.appendChild(sec);
    }
    // count-up + roadmap bar (respect reduced motion)
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    document.querySelectorAll('[data-count]').forEach(el=>{
      const target = +el.dataset.count;
      if (reduce){ el.textContent = target; return; }
      let v = 0; const step = Math.max(1, Math.round(target/40));
      const t = setInterval(()=>{ v+=step; if(v>=target){v=target;clearInterval(t);} el.textContent=v; }, 22);
    });
    requestAnimationFrame(()=>{ const f=document.querySelector('.fill'); if(f) f.style.width=f.dataset.w+'%'; });
  </script>
</body>
</html>
